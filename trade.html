<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  push,
  set,
  get,
  update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyD4NQ9EsQqerx6y7v322p2ycraoDWJSRcM",
  authDomain: "airdropusdt-767d7.firebaseapp.com",
  databaseURL: "https://airdropusdt-767d7-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "airdropusdt-767d7",
  storageBucket: "airdropusdt-767d7.firebasestorage.app",
  messagingSenderId: "627616603037",
  appId: "1:627616603037:web:63041f067800c97fab6d74"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth = getAuth(app);

window.db = db;

onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  window.userId = user.uid;

  const balanceRef =
    ref(db, `users/${window.userId}/balance`);

  onValue(balanceRef, (snap) => {
    const balance = Number(snap.val() || 0);

    document.getElementById("balance").innerText =
      `Balance: $${balance.toFixed(2)}`;
  });

});
</script>

<script>
let currentPrice = 0;
function initApp() {

const coins = [
"bitcoin","ethereum","tether","binancecoin","solana",
"ripple","cardano","dogecoin","tron","litecoin"
];

const params = new URLSearchParams(location.search);

let coin =
params.get("coin") ||
document.getElementById("coinSelect").value;

const API_BASE = "https://api.coingecko.com/api/v3";

document.getElementById("title").innerText =
  coin.toUpperCase() + " TRADE";
const coinSelect =
document.getElementById("coinSelect");

coinSelect.value = coin;

coinSelect.addEventListener("change", () => {

const selectedCoin = coinSelect.value;

window.location.href =
`trade.html?coin=${selectedCoin}`;

});
/* SAFE FETCH */
async function safeFetch(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch {
    return null;
  }
}

/* PRICE */
async function loadPrice() {

  const data = await safeFetch(
    `${API_BASE}/simple/price?ids=${coin}&vs_currencies=usd`
  );

  currentPrice = data?.[coin]?.usd || 0;

  document.getElementById("price").innerText =
    "$" + currentPrice.toLocaleString();

  updateEntryPrice();
}
function updateEntryPrice(){

  const amount =
  Number(document.getElementById("tradeAmount").value);

  const entryInput =
  document.getElementById("entryPrice");

  if(!amount || !currentPrice){
    entryInput.value = "";
    return;
  }

  entryInput.value = currentPrice.toFixed(2);
}
document
.getElementById("tradeAmount")
.addEventListener("input", updateEntryPrice);
/* CHART */
const container = document.getElementById("chart");

const chart = LightweightCharts.createChart(container,{
  width: container.offsetWidth,
  height: container.offsetHeight || 450,
  layout: { background: { color: "transparent" }, textColor: "white" },
  grid: { vertLines: { color: "#222" }, horzLines: { color: "#222" } },
  width: container.clientWidth,
  height: 420
});

const series = chart.addCandlestickSeries({
  upColor: "#00ff88",
  downColor: "#ff4d4d",
  borderVisible: false,
  wickUpColor: "#00ff88",
  wickDownColor: "#ff4d4d"
});

async function loadChart() {
  const data = await safeFetch(
    `${API_BASE}/coins/${coin}/ohlc?vs_currency=usd&days=1`
  );

  let candles = [];

  if (Array.isArray(data) && data.length) {
    candles = data.map(d => ({
      time: Math.floor(d[0] / 1000),
      open: d[1],
      high: d[2],
      low: d[3],
      close: d[4]
    }));
  } else {
    let price = 100;

    for (let i = 0; i < 80; i++) {
      const open = price;
      const close = open + (Math.random() - 0.5) * 2;

      candles.push({
        time: Math.floor(Date.now() / 1000) - (80 - i) * 60,
        open,
        high: Math.max(open, close),
        low: Math.min(open, close),
        close
      });

      price = close;
    }
  }

  series.setData(candles);
chart.timeScale().fitContent();
}

/* INIT */
loadPrice();
loadChart();

setInterval(loadPrice, 10000);
setInterval(loadChart, 10000);

/* RESIZE */
window.addEventListener("resize", () => {
  chart.applyOptions({ width: container.clientWidth });
});

/* TOAST */
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

/* =========================
   BUTTONS (FIXED)
========================= */
const buyBtn = document.getElementById("buyBtn");
const sellBtn = document.getElementById("sellBtn");

buyBtn.onclick = async () => {
  if (!window.userId) {
  return toast("Please wait...");
}
  const amount =
Number(document.getElementById("tradeAmount").value);

  const price =
Number(document.getElementById("entryPrice").value);

  if (!amount) return toast("Enter amount");

  const userRef = ref(window.db, `users/${window.userId}`);
  const snap = await get(userRef);

  if (!snap.exists()) return toast("User not found");

  const balance = Number(snap.val().balance || 0);

  if (amount > balance) return toast("Insufficient balance");

  await update(userRef, { balance: balance - amount });

  const tradeRef = push(ref(window.db, `users/${window.userId}/trades`));

  await set(tradeRef, {
    type: "BUY",
    coin,
    amount,
    entryPrice: price,
    status: "OPEN",
    createdAt: Date.now()
  });

  toast("BUY placed");
};

sellBtn.onclick = async () => {
  if (!window.userId) {
  return toast("Please wait...");
}
  const amount = Number(document.querySelectorAll("input")[0].value);

  const price = Number(
    document.getElementById("price").innerText.replace("$", "")
  );

  if (!amount) return toast("Enter amount");

  const userRef = ref(window.db, `users/${window.userId}`);
  const snap = await get(userRef);

  if (!snap.exists()) return toast("User not found");

  const balance = Number(snap.val().balance || 0);

  if (amount > balance) return toast("Insufficient balance");

  await update(userRef, { balance: balance - amount });

  const tradeRef = push(ref(window.db, `users/${window.userId}/trades`));

  await set(tradeRef, {
    type: "SELL",
    coin,
    amount,
    entryPrice: price,
    status: "OPEN",
    createdAt: Date.now()
  });

  toast("SELL placed");
};

}

/* SAFE AUTO START (IMPORTANT FIX) */
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initApp);
} else {
  initApp();
}
</script>
