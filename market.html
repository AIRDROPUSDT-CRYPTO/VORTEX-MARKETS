<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX MARKETS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:
radial-gradient(circle at 15% 20%, rgba(0,255,247,0.25), transparent 40%),
radial-gradient(circle at 85% 75%, rgba(255,46,136,0.22), transparent 45%),
radial-gradient(circle at 50% 50%, rgba(106,17,203,0.18), transparent 50%),
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
#0b1020;

background-size:
100% 100%,
100% 100%,
100% 100%,
45px 45px,
45px 45px,
cover;

color:white;
overflow-x:hidden;
}

/* HEADER */
.header{
position:sticky;
top:0;
z-index:100;
padding:14px 16px;
background:rgba(10,15,30,0.6);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,0.05);
font-weight:800;
letter-spacing:2px;
color:#00f7ff;
}

/* CONTAINER */
.container{
padding:15px;
padding-bottom:140px;
}

/* MARKET ROW */
.market{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.market-left{
display:flex;
align-items:center;
gap:10px;
}

.market-left img{
width:28px;
height:28px;
}

.market-name{
font-weight:700;
}

.market-sub{
font-size:12px;
color:#9fb3c8;
}

.market-right{
text-align:right;
font-weight:700;
}

/* NAV (IDENTICAL TO DASHBOARD) */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:rgba(17,25,40,0.95);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.08);
}

.nav a{
color:#9fb3c8;
text-decoration:none;
font-size:11px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
flex:1;
}

.nav a.active{
color:#00ff88;
}

.icon{
width:22px;
height:22px;
fill:none;
stroke:currentColor;
stroke-width:2;
}

/* CENTER BUTTON */
.center-btn{
width:58px;
height:58px;
background:linear-gradient(135deg,#00f7ff,#00ff88);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-top:-25px;
box-shadow:0 10px 25px rgba(0,255,136,0.25);
}
</style>
</head>

<body>

<div class="header">VORTEX MARKETS</div>

<div class="container">
  <div id="markets"></div>
</div>

<!-- NAV (same as dashboard) -->
<div class="nav">

  <a href="dashboard.html">
    <svg class="icon" viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v11a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>
    Home
  </a>

  <a href="market.html" class="active">
    <svg class="icon" viewBox="0 0 24 24"><path d="M4 19V5m6 14V9m6 10V3m6 16v-8"/></svg>
    Markets
  </a>

  <a href="trade.html" class="center-btn">
    <svg viewBox="0 0 24 24"><path d="M7 17l10-10M7 7h10v10"/></svg>
  </a>

  <a href="activity.html">
    <svg class="icon" viewBox="0 0 24 24"><path d="M3 3v18h18M7 14l3-3 3 3 5-5"/></svg>
    Activity
  </a>

  <a href="profile.html">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-4 0-7 2-7 5v2h14v-2c0-3-3-5-7-5z"/></svg>
    Profile
  </a>

</div>

<script>
const coins = [
const coins = [
"bitcoin","ethereum","tether","binancecoin","solana",
"ripple","cardano","dogecoin","tron","litecoin"
];

let marketData = [];

async function loadMarkets(){
  try{
    const url =
`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${coins.join(",")}`;

    const res = await fetch(url);
    const data = await res.json();

    marketData = data;
    renderMarkets();

  } catch(err){
    console.error("Market error:", err);
  }
}

function renderMarkets(){
  const container = document.getElementById("markets");
  container.innerHTML = "";

  marketData.forEach(c => {

    const change = c.price_change_percentage_24h || 0;
    const color = change >= 0 ? "#00ff88" : "#ff4d4d";

    container.innerHTML += `
    <div class="market"
     onclick="location.href='trade.html?coin=${c.id}'"
     style="cursor:pointer">
        <div class="market-left">
          <img src="${c.image}">
          <div>
            <div class="market-name">${c.symbol.toUpperCase()}</div>
            <div class="market-sub">${c.name}</div>
          </div>
        </div>

        <div class="market-right" style="color:${color}">
          <div>$${c.current_price.toFixed(2)}</div>
          <div style="font-size:11px;">
            ${change >= 0 ? '+' : ''}${change.toFixed(2)}%
          </div>
        </div>
      </div>
    `;
  });
}

loadMarkets();
setInterval(loadMarkets, 10000);
</script>

</body>
</html>
