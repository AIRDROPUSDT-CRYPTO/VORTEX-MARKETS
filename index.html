<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX MARKETS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.82)),
url('https://images.unsplash.com/photo-1642104704074-907c0698cbd9?auto=format&fit=crop&w=1920&q=80');
background-size:cover;
background-position:center;
}

/* CARD */
.card{
width:90%;
max-width:430px;
padding:30px;
border-radius:25px;
background:rgba(17,25,40,0.82);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 25px rgba(0,255,255,.15);
}

.logo{
text-align:center;
font-size:32px;
font-weight:800;
margin-bottom:5px;
background:linear-gradient(90deg,#00f7ff,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#b7c3d1;
font-size:13px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
outline:none;
border-radius:12px;
background:#101826;
color:white;
font-size:14px;
}

input::placeholder{color:#7f8ea3;}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:700;
background:linear-gradient(90deg,#00f7ff,#00ff88);
color:#000;
transition:0.3s;
margin-top:5px;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 18px rgba(0,255,170,.5);
}

/* LINK */
.link{
text-align:center;
margin-top:12px;
font-size:13px;
color:#b7c3d1;
}

.link a{
color:#00f7ff;
text-decoration:none;
font-weight:600;
}

.link a:hover{
text-decoration:underline;
}

/* FOOTER */
.footer{
position:absolute;
bottom:15px;
left:0;
right:0;
text-align:center;
font-size:12px;
color:#aab3c0;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
right:20px;
padding:12px 16px;
border-radius:10px;
color:#fff;
font-size:13px;
font-weight:600;
opacity:0;
transform:translateY(-20px);
transition:0.3s;
z-index:9999;
}

.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:#00ff88;color:#000;}
.toast.error{background:#ff4d4d;}
</style>
</head>

<body>

<div class="card">

<div class="logo">VORTEX MARKETS</div>
<div class="subtitle">Create your trading account</div>

<input type="text" id="username" placeholder="Username">
<input type="email" id="email" placeholder="Email Address">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">
<input type="text" id="referral" placeholder="Enter Referral Code (optional)">

<button onclick="registerUser()">REGISTER</button>

<div class="link">
Have an account? <a href="login.html">Login</a>
</div>

</div>

<div class="footer">
© 2026 VORTEX MARKETS. All Rights Reserved.
</div>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
update
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD4NQ9EsQqerx6y7v322p2ycraoDWJSRcM",
authDomain: "airdropusdt-767d7.firebaseapp.com",
databaseURL: "https://airdropusdt-767d7-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "airdropusdt-767d7",
storageBucket: "airdropusdt-767d7.firebasestorage.app",
messagingSenderId: "627616603037",
appId: "1:627616603037:web:63041f067800c97fab6d74"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* TOAST */
function toast(msg,type="success"){
const t=document.getElementById("toast");
t.className=`toast ${type}`;
t.innerHTML=msg;
setTimeout(()=>t.classList.add("show"),100);
setTimeout(()=>t.classList.remove("show"),3000);
}

window.toast = toast;

/* AUTO SKIP IF LOGGED IN */
onAuthStateChanged(auth,(user)=>{
if(user){
window.location.href="dashboard.html";
}
});

/* REGISTER */
window.registerUser = async ()=>{

const username = document.getElementById("username").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const confirm = document.getElementById("confirm").value;
const referral = document.getElementById("referral").value.trim();

if(!username || !email || !password || !confirm){
toast("Fill all required fields","error");
return;
}

if(password !== confirm){
toast("Passwords do not match","error");
return;
}

if(password.length < 6){
toast("Password too weak (min 6 chars)","error");
return;
}

try{

const userCred = await createUserWithEmailAndPassword(auth,email,password);
const user = userCred.user;

/* referral hidden tracking */
const refCode = referral || "NONE";

/* save user */
await set(ref(db,"users/"+user.uid),{
uid:user.uid,
username:username,
email:user.email,
referralCode:refCode,
balance:0,
profit:0,
createdAt:Date.now(),
online:true
});

toast("Account created successfully","success");

setTimeout(()=>{
window.location.href="dashboard.html";
},1200);

}catch(err){

toast(err.message,"error");

}

};

</script>

</body>
</html>
